name: Build Pulse Ledger APK
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Publish failure log
        if: failure()
        run: |
          tail -n 400 build.log > error-tail.txt
          git config user.name "ci"; git config user.email "ci@local"
          git checkout -B ci-logs
          git add -f error-tail.txt
          git commit -m "build error log"
          git push -f origin ci-logs

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk pulse-ledger.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.${{ github.run_number }}"
          name: "Pulse Ledger 0.1.${{ github.run_number }}"
          files: pulse-ledger.apk
          make_latest: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-ledger-apk
          path: pulse-ledger.apk
